name: ci

on:
  push:
    branches: ['**']    # 全ブランチ。tags は release.yml の担当
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: ビルド(警告=エラー)
        run: dotnet build yEdit.sln -c Release -warnaserror

      # テストプロジェクトを追加/削除する場合は 3 箇所同期: tools/pre-merge-check.ps1・.github/workflows/ci.yml・.github/workflows/release.yml
      # (sln 一括ステップ寄せは検討済みだが、dotnet test yEdit.sln が Editor/App 両 UI アセンブリを並列実行するため現状維持)
      - name: Core.Tests
        run: dotnet test tests/yEdit.Core.Tests -c Release --no-build

      - name: Editor.Tests(LocalOnly 除外)
        run: dotnet test tests/yEdit.Editor.Tests -c Release --no-build --filter "Category!=LocalOnly"

      - name: App.Tests(LocalOnly 除外)
        run: dotnet test tests/yEdit.App.Tests -c Release --no-build --filter "Category!=LocalOnly"
